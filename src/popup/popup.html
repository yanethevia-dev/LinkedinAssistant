<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkedIn Assistant</title>
  <style>
    body {
      width: 320px;
      padding: 16px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
    }
    h1 {
      margin: 0 0 16px 0;
      font-size: 18px;
      color: #000;
    }
    .status {
      padding: 12px;
      background: #e8f4f8;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    .status-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .status-item:last-child {
      margin-bottom: 0;
    }
    .status-label {
      color: #666;
    }
    .status-value {
      font-weight: 600;
      color: #0a66c2;
    }
    .btn {
      width: 100%;
      padding: 10px;
      background: #0a66c2;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 8px;
    }
    .btn:hover {
      background: #084d8d;
    }
    .btn-secondary {
      background: white;
      color: #0a66c2;
      border: 1px solid #0a66c2;
    }
    .btn-secondary:hover {
      background: #f3f6f8;
    }
    .footer {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #e0e0e0;
      font-size: 12px;
      color: #666;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>LinkedIn Assistant</h1>

  <div class="status">
    <div class="status-item">
      <span class="status-label">Status:</span>
      <span class="status-value" id="status">Checking...</span>
    </div>
    <div class="status-item">
      <span class="status-label">Version:</span>
      <span class="status-value">0.1.0</span>
    </div>
  </div>

  <button class="btn" id="openOptions">Settings</button>
  <button class="btn btn-secondary" id="testConnection">Test Connection</button>

  <div class="footer">
    Visit LinkedIn to use the assistant
  </div>

  <script src="popup.js"></script>
</body>
</html>
